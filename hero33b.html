<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="description" content="Author: Jamie Marriott">
<meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1">
<link rel="stylesheet" href="css2/plymouth_reset.css">
<link rel="stylesheet" href="css2/plymouth_framework.css">
<link rel="stylesheet" href="css2/plymouth_theme.css">
<title>University of Plymouth</title>
<style>
/*
* {
	outline: 1px dotted red;
	outline-offset: -1px;
}
*/
.hero {
	display: grid;
}
.hero > * {
	grid-area: 1 / 1;
}
.hero img {
	width: 100%;
	height: auto;
	object-fit: cover;
	display: block;
}
.overlay {
	background: rgba(0, 0, 0, 0.55);
}
.content {
	align-self: center;
	justify-self: center;
	max-width: 75ch;
	z-index: 1;
}

/* ===== Responsive enhancement: mobile stacks content below image ===== */
@media (max-width: 60em) {
.hero {
	display: block;
}
/* Image remains full width naturally in document flow */
.hero img {
	width: 100%;
	height: auto;
}
/* Convert overlay content into a full-width card below image */
.content.overlay {
	max-width: 100%;
	width: 100%;
	color: #111;
	border-radius: 0;
}
/* Ensure any inherited overlay intent is neutralised visually */
.overlay {
	background: #f3f3f3;
	color: #000;
}
}
.m-hero {
	margin: 2em;
}

@media (max-width: 60em) {
.m-hero {
	margin: 0;
}
}
.rounded-hero {
	border-radius: 2em;
	overflow: hidden;
}

@media (max-width: 60em) {
.rounded-hero {
	border-radius: 0;
}
}
[data-position="top-left"] {
	align-self: start;
	justify-self: start;
}
[data-position="top"] {
	align-self: start;
	justify-self: center;
}
[data-position="top-right"] {
	align-self: start;
	justify-self: end;
}
[data-position="center"] {
	align-self: center;
	justify-self: center;
}
[data-position="bottom-left"] {
	align-self: end;
	justify-self: start;
}
[data-position="bottom"] {
	align-self: end;
	justify-self: center;
}
[data-position="bottom-right"] {
	align-self: end;
	justify-self: end;
}
.hero a {
	text-decoration: underline;
}
</style>
</head>
<body>
<main>
  <section class="hero"><img src="images/1280x720nurse2.webp" alt="">
    <div class="content mrfrosty black-text rounded-hero m-hero p-responsive text-resize" data-position="bottom-left">
      <h1>It's your future<br>
        Make it here</h1>
      <p>Visit our open day to get a taste of life here at Plymouth</p>
      <div class="flex flex-wrap gap-1">
        <button class="btn btn-primary">Open day - Saturday 20 June</button>
        <button class="btn btn-light"><span class="iconfont" aria-hidden="true">B</span>Find your course</button>
      </div>
    </div>
  </section>
</main>
</body>
</html>
