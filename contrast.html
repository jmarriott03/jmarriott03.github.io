<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="description" content="Author: Jamie Marriott">
<meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1">
<link rel="stylesheet" href="css2/plymouth_reset.css">
<link rel="stylesheet" href="css2/plymouth_framework.css">
<link rel="stylesheet" href="css2/plymouth_theme.css">
<title>University of Plymouth</title>
<style>
/*
* {
	outline: 1px dotted red;
	outline-offset: -1px;
}
*/
.upload-area {
	border: 2px dashed var(--mgrey);
	border-radius: 1em;
	padding: 2em;
	text-align: center;
	background: #var(--white);
	cursor: pointer;
	transition: all 0.3s;
}
.upload-area:hover {
	border-color: var(--dgrey);
	background: var(--lgrey);
}
.upload-area.dragover {
	border-color: var(--dgrey);
	background: var(--lgrey);
}
.controls {
	margin: 2em 0;
	display: none;
}
.controls.visible {
	display: block;
}
.canvas-container {
	margin: 1.5em 0;
	display: none;
}
.canvas-container.visible {
	display: block;
}
canvas {
	max-width: 100%;
	border-radius: 1em;
	background: var(--white);
	;
}
.download-btn {
	display: none;
}
.download-btn.visible {
	display: block;
}
.stats {
	background: var(--lgrey);
	padding: 1em;
border-radius: 1em margin-bottom: 1.5em;
	display: none;
}
.stats.visible {
	display: block;
}
.note {
	background: var(--lgrey);
	padding: 1em;
	border-radius: 1em;
	margin-bottom: 1.5em;
}
</style>
</head>
<body>
<main>
  <div class="w-60 p-responsive">
    <h1>contrast</h1>
    <p class="description"> Drag &amp; drop an image or click to select <span class="iconfont" aria-hidden="true">&#34;</span> Highlights light pixels as #f06 (magenta)</p>
    <div class="note"> <span class="iconfont" aria-hidden="true">a</span> <strong>White/Light images</strong>: Most pixels will be highlighted (fail contrast with white text).<br>
      <span class="iconfont" aria-hidden="true">6</span> <strong>Dark images</strong>: Few pixels highlighted (white text already has good contrast). </div>
    <div class="upload-area" id="uploadArea">
      <label for="fileInput" class="m-0" style="cursor:pointer; display:block;"> <span class="iconfont" aria-hidden="true">V</span> Drag &amp; drop your screenshot here, or click to select </label>
      <input type="file" id="fileInput" accept="image/*" style="display:none;">
    </div>
    <div class="controls" id="controls">
      <button class="btn btn-primary" id="convertBtn">Highlight Low Contrast Pixels</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="canvas-container" id="canvasContainer">
      <canvas id="canvas"></canvas>
    </div>
    <button class="btn btn-primary download-btn" id="downloadBtn"><span class="iconfont" aria-hidden="true">%</span> Download Result</button>
    <script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const controls = document.getElementById('controls');
const convertBtn = document.getElementById('convertBtn');
const canvasContainer = document.getElementById('canvasContainer');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const downloadBtn = document.getElementById('downloadBtn');
const stats = document.getElementById('stats');

let originalImage = null;
let originalData = null;

uploadArea.addEventListener('click', function(e) {
    fileInput.click();
});

fileInput.addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) {
        loadImage(e.target.files[0]);
    }
});

uploadArea.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', function(e) {
    e.preventDefault();
    e.stopPropagation();
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    uploadArea.classList.remove('dragover');

    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]) {
        loadImage(e.dataTransfer.files[0]);
    }
});

document.addEventListener('dragover', function(e) {
    e.preventDefault();
});

document.addEventListener('dragenter', function(e) {
    e.preventDefault();
});

document.addEventListener('drop', function(e) {
    e.preventDefault();
});

function loadImage(file) {
    if (!file.type.match('image.*')) {
        alert('Please select an image file');
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        originalImage = new Image();
        originalImage.onload = function() {
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            ctx.drawImage(originalImage, 0, 0);
            originalData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            controls.classList.add('visible');
            canvasContainer.classList.add('visible');
            stats.classList.remove('visible');
            downloadBtn.classList.remove('visible');
        };
        originalImage.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function getLuminance(r, g, b) {
    const rs = r / 255;
    const gs = g / 255;
    const bs = b / 255;

    const rLin = rs <= 0.03928 ? rs / 12.92 : Math.pow((rs + 0.055) / 1.055, 2.4);
    const gLin = gs <= 0.03928 ? gs / 12.92 : Math.pow((gs + 0.055) / 1.055, 2.4);
    const bLin = bs <= 0.03928 ? bs / 12.92 : Math.pow((bs + 0.055) / 1.055, 2.4);

    return 0.2126 * rLin + 0.7152 * gLin + 0.0722 * bLin;
}

function getContrastRatio(lum1, lum2) {
    const lighter = Math.max(lum1, lum2);
    const darker = Math.min(lum1, lum2);
    return (lighter + 0.05) / (darker + 0.05);
}

const HIGHLIGHT = [255, 0, 102]; // #f06
const TEXT_LUM = getLuminance(255, 255, 255); // White = 1.0
const MIN_RATIO = 4.5; // WCAG AA Normal Text

convertBtn.addEventListener('click', function() {
    if (!originalData) return;

    convertBtn.disabled = true;
    convertBtn.textContent = 'Processing...';

    setTimeout(function() {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        let pixelsChanged = 0;
        const totalPixels = data.length / 4;

        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];

            const pixelLum = getLuminance(r, g, b);
            const ratio = getContrastRatio(pixelLum, TEXT_LUM);

            if (ratio < MIN_RATIO) {
                data[i] = HIGHLIGHT[0];
                data[i + 1] = HIGHLIGHT[1];
                data[i + 2] = HIGHLIGHT[2];
                pixelsChanged++;
            }
        }

        ctx.putImageData(imageData, 0, 0);

        const pct = ((pixelsChanged / totalPixels) * 100).toFixed(1);
        stats.innerHTML =
            'Processed ' + totalPixels + ' pixels<br>' +
            'Changed ' + pixelsChanged + ' pixels (' + pct + '% of image)<br>' +
            'Light pixels highlighted as #f06 (magenta)<br>' +
            'Check: WCAG AA Normal Text (4.5:1 for white text)';

        stats.classList.add('visible');

        downloadBtn.classList.add('visible');
        convertBtn.disabled = false;
        convertBtn.textContent = 'Highlight Low Contrast Pixels';
    }, 50);
});

downloadBtn.addEventListener('click', function() {
    const link = document.createElement('a');
    link.download = 'wcag-light-highlight.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
});
	  </script> 
  </div>
</main>
</body>
</html>
