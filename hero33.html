<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="description" content="Author: Jamie Marriott">
<meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1">
<link rel="stylesheet" href="css2/plymouth_reset.css">
<link rel="stylesheet" href="css2/plymouth_framework.css">
<link rel="stylesheet" href="css2/plymouth_theme.css">
<title>University of Plymouth</title>
<style>
.hero-2col {
	position: relative;
}
.right-column {
	position: relative;
}
.right-column::before {
	content: "";
	position: absolute;
	inset: 0;
	background: linear-gradient(
  to right,
  hsl(var(--bg-color-dark) / 1) 0%,
  hsl(var(--bg-color-dark) / 0) 50%
);
	pointer-events: none;
	z-index: 1;
}
.right-column img {
	position: relative;
	z-index: 0;
}

/* No gradient on smaller widths */
@media (max-width: 60em) {
.right-column::before {
	display: none;
}
}
</style>
</head>
<body>
<main>
  <section>
    <div class="hero-2col layout-33-67 bg-color-dark mb-reg" data-theme="bondi-blue">
      <div class="left-column p-resize">
        <div class="centered text-resize">
          <h1>It's your future<br>
            Make it here</h1>
          <p>Visit our open day to get a taste of life here at Plymouth</p>
          <div class="flex flex-wrap gap-1 mb-reg">
            <button class="btn btn-outline btn-outline-dark">Open day - Saturday 20 June</button>
            <button class="btn btn-outline btn-outline-dark"><span class="iconfont" aria-hidden="true">B</span>Find your course</button>
          </div>
        </div>
      </div>
      <div class="right-column"><img src="images/1280x720nurse2.webp" width="1280" height="720" alt="" class="img-cover"></div>
    </div>
  </section>
	
	<section>
    <div class="hero-2col layout-33-67 bg-color-dark" data-theme="deep-orange">
      <div class="left-column p-resize">
        <div class="centered text-resize">
          <h1>It's your future<br>
            Make it here</h1>
          <p>Visit our open day to get a taste of life here at Plymouth</p>
          <div class="flex flex-wrap gap-1 mb-reg">
            <button class="btn btn-outline btn-outline-dark">Open day - Saturday 20 June</button>
            <button class="btn btn-outline btn-outline-dark"><span class="iconfont" aria-hidden="true">B</span>Find your course</button>
          </div>
        </div>
      </div>
      <div class="right-column"><img src="images/1920x1080babbage.webp" width="1920" height="1280" alt="" class="img-cover"></div>
    </div>
  </section>
</main>
</body>
</html>
