<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="description" content="Author: Jamie Marriott">
<meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1">
<link rel="stylesheet" href="css2/plymouth_reset.css">
<link rel="stylesheet" href="css2/plymouth_framework.css">
<link rel="stylesheet" href="css2/plymouth_theme.css">
<title>University of Plymouth</title>
</head>
<body>
<main>
  <div class="w-80 p-responsive">
    <h1>button5</h1>
    <h2>Pills</h2>
    <div class="pill-group mb-reg" role="group" aria-label="Study level filters">
      <button class="pill" aria-pressed="true"> Undergraduate <span class="pill-check iconfont" aria-hidden="true">6</span> </button>
      <button class="pill" aria-pressed="true"> Postgraduate taught <span class="pill-check iconfont" aria-hidden="true">6</span> </button>
      <button class="pill" aria-pressed="true"> Postgraduate research <span class="pill-check iconfont" aria-hidden="true">6</span> </button>
      <button class="pill" aria-pressed="false"> Professional development <span class="pill-check iconfont" aria-hidden="true">6</span> </button>
      <button class="pill" aria-pressed="false"> Degree apprenticeship <span class="pill-check iconfont" aria-hidden="true">6</span> </button>
      <button class="pill" aria-pressed="false"> Online <span class="pill-check iconfont" aria-hidden="true">6</span> </button>
    </div>
    <h2>Button colours</h2>
    <div class="flex-group mb-reg">
      <button class="btn btn-primary"> <span class="iconfont" aria-hidden="true">/</span>Primary</button>
      <button class="btn btn-secondary"> <span class="iconfont" aria-hidden="true">0</span>Secondary</button>
      <button class="btn btn-success"> <span class="iconfont" aria-hidden="true">6</span>Success</button>
      <button class="btn btn-danger"> <span class="iconfont" aria-hidden="true">a</span>Danger</button>
      <button class="btn btn-warning"> <span class="iconfont" aria-hidden="true">G</span>Warning</button>
      <button class="btn btn-info"> <span class="iconfont" aria-hidden="true">é</span>Info</button>
      <button class="btn btn-light"> <span class="iconfont" aria-hidden="true">ä</span>Light</button>
      <button class="btn btn-dark"> <span class="iconfont" aria-hidden="true">ä</span>Dark</button>
    </div>
    <h2>Disabled buttons</h2>
    <div class="flex-group mb-reg">
      <button class="btn btn-primary">Primary enabled</button>
      <button class="btn btn-primary" disabled>Primary disabled</button>
      <button class="btn btn-light">Light enabled</button>
      <button class="btn btn-light" disabled>Light disabled</button>
      <button class="btn btn-primary" aria-disabled="true" tabindex="-1"> ARIA disabled </button>
    </div>
    <h2>Outline button</h2>
    <div class="bck-lgrey p-responsive">
      <button class="btn btn-outline btn-outline-light"> <span class="iconfont" aria-hidden="true">0</span> <span class="nowrap">+44 1752 600600</span> </button>
    </div>
    <div class="bck-dgrey p-responsive mb-reg">
      <button class="btn btn-outline btn-outline-dark"> <span class="iconfont" aria-hidden="true">0</span> <span class="nowrap">+44 1752 600600</span> </button>
    </div>
    <h2>Outline button text resize</h2>
    <div class="bck-lgrey p-responsive text-resize">
      <button class="btn btn-outline btn-outline-light"> <span class="iconfont" aria-hidden="true">0</span> <span class="nowrap">+44 1752 600600</span> </button>
    </div>
    <div class="bck-dgrey p-responsive text-resize">
      <button class="btn btn-outline btn-outline-dark"> <span class="iconfont" aria-hidden="true">0</span> <span class="nowrap">+44 1752 600600</span> </button>
    </div>
  </div>
</main>
<script>
  const pillButtons = document.querySelectorAll('.pill');

  pillButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const pressed = btn.getAttribute('aria-pressed') === 'true';
      btn.setAttribute('aria-pressed', String(!pressed));
    });
  });

  document.querySelectorAll('[aria-disabled="true"]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      e.stopImmediatePropagation();
    });
  });
</script>
</body>
</html>
