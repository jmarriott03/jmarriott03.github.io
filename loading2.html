<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="description" content="Author: Jamie Marriott">
<meta name="viewport" content="width=device-width, minimum-scale=1, initial-scale=1">
<link rel="stylesheet" href="css2/plymouth_reset.css">
<link rel="stylesheet" href="css2/plymouth_framework.css">
<title>University of Plymouth</title>
<style>
/*
* {
	outline: 1px dotted red;
	outline-offset: -1px;
}
*/
.full-height {
	min-height: 100vh
}
.thinking-indicator {
	display: inline-flex;
	align-items: flex-end;
	gap: 0.4rem;
	min-height: 1rem;
}
.dot {
	width: 0.5rem;
	height: 0.5rem;
	border-radius: 50%;
	background: currentColor;
	animation: bounce 1.2s infinite ease-in-out;
}
.dot:nth-child(2) {
	animation-delay: 0.3s;
}
.dot:nth-child(3) {
	animation-delay: 0.15s;
}
@keyframes bounce {
0%, 60%, 100% {
transform: translateY(0);
}
30% {
transform: translateY(-0.4rem);
}
}
.sr-only {
	position: absolute;
	width: 1px;
	height: 1px;
	padding: 0;
	margin: -1px;
	overflow: hidden;
	clip-path: inset(50%);
	white-space: nowrap;
	border: 0;
}

@media (prefers-reduced-motion: reduce) {
.dot {
	animation: none;
}
}
</style>
</head>
<body class="bck-black">
<main>
  <div class="w-40 full-height centered white-text items-center">
    <div class="thinking-indicator" role="status" aria-live="polite"><span class="sr-only">Generating response…</span><span class="dot" aria-hidden="true"></span><span class="dot" aria-hidden="true"></span><span class="dot" aria-hidden="true"></span></div>
  </div>
</main>
</body>
</html>
